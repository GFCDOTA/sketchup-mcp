# SDD spec — fidelity aspect on planta_74.
#
# This file connects the SDD framework to the Visual Fidelity Gate
# Protocol (docs/protocols/visual_fidelity_gate_protocol.md) and to
# the geometry-invariants report. The harness checks that:
#
#   - the evidence pack is present (subset of the 7-artifact contract);
#   - geometry invariants verdict is PASS;
#   - fidelity report axes are above advisory thresholds.
#
# These rules are deliberately advisory (warn) for Phase 1 of the SDD
# roll-out. Phase 3 will promote individual contracts to critical
# after a cooldown period demonstrates they're trustworthy.
#
# Companion: docs/engineering/spec_driven_development.md
schema_version: "1.0.0"
target: planta_74

contracts:

  # ---- critical: invariants must not regress ----------------------

  - id: fidelity-invariants-must-pass
    severity: critical
    description: >
      The geometry_invariants_report.json's top-level verdict MUST
      be PASS. A FAIL in invariants means the SKP has a group with
      wrong material / wrong height / wrong topology — the most
      reliable downstream "broken SKP" signal. Surfaces FP-014
      (autorun) + FP-015 (DoorLeaf) regressions among others.
    evidence_pointers:
      - tools/build_geometry_invariants_report.py
    rule:
      type: invariants_verdict_pass

  # ---- warn: evidence pack & fidelity-report axes -----------------

  - id: fidelity-evidence-pack-present
    severity: warn
    description: >
      A subset of the visual-fidelity-gate 7-artifact contract.
      Required artifacts in --evidence-dir for a shippable change.
      Warn here (not critical) because the operator may run the
      spec harness BEFORE the artifacts are generated; the gate
      itself is the authoritative enforcer at promotion time.
    evidence_pointers:
      - docs/protocols/visual_fidelity_gate_protocol.md
    rule:
      type: evidence_pack_present
      required_artifacts:
        - original_floorplan.png
        - skp_render.png
        - overlay_pdf_skp.png

  - id: fidelity-axis-walls-min-score
    severity: warn
    description: >
      The walls axis of the fidelity report must score at least 0.80.
      Below that, the wall geometry has diverged from the PDF
      meaningfully; investigate before promotion.
    rule:
      type: fidelity_axis_pass
      axes: [walls]
      min_score: 0.80

  - id: fidelity-axis-rooms-min-score
    severity: warn
    description: >
      The rooms axis must score at least 0.75. Lower threshold than
      walls because Voronoi sub-division currently produces
      approximate areas (ADR-003 §12); will tighten once the
      operator paints additional human SBs and the rooms axis
      converges to architectural truth.
    rule:
      type: fidelity_axis_pass
      axes: [rooms]
      min_score: 0.75

  # ---- info: observational axis spread ----------------------------

  - id: fidelity-axes-observed
    severity: info
    description: >
      Surface the per-axis scores so operators can see the spread
      without parsing the full fidelity report manually.
    rule:
      type: fidelity_axes_observe
