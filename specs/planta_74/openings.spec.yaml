# SDD spec — openings aspect on planta_74.
#
# Source of truth: CLAUDE.md §10 (11 openings: 5 interior_door,
# 2 interior_passage, 2 window, 2 glazed_balcony). The planta_74
# fixture currently shows 12 openings (extra LAVABO door variant).
# Architectural read: every BANHO / LAVABO / SUITE must have at
# least one door. The DoorLeaf positioning bug (FP-015) is a
# regression-locked contract via the proximity rule.
#
# Companion: docs/engineering/spec_driven_development.md
schema_version: "1.0.0"
target: planta_74

contracts:

  # ---- critical: doors must reach the rooms that need them --------

  - id: openings-bathrooms-must-have-door
    severity: critical
    description: >
      BANHO 01, BANHO 02, LAVABO and the two SUITES must each have
      at least one opening (door or passage) on their perimeter.
      A bathroom or bedroom without a door is the obvious failure
      mode; if it happens the extractor missed the door arc or the
      polygonize cell isn't actually a bathroom.
    rule:
      type: room_has_door
      rooms_requiring_door:
        - BANHO 01
        - BANHO 02
        - LAVABO
        - SUITE 01
        - SUITE 02

  - id: openings-door-leaf-proximity-to-host
    severity: critical
    description: >
      Every DoorLeaf_Group emitted by the plan-shell exporter must
      sit within 1.0 m of its host opening's declared center.
      This is the FP-015 regression — the vertical-wall hinge_world
      bug parked leaves metres from their walls. Pinned by
      tests/test_plan_shell_invariants.py::test_door_leaf_stays_near_its_opening_center;
      the spec rule below is the architectural projection of that
      implementation test (extends to any planta with the same
      invariants report shape).
    evidence_pointers:
      - docs/learning/failure_patterns.md#FP-015
    rule:
      type: door_leaf_proximity
      max_distance_m: 1.0

  # ---- warn: opening kind distribution ----------------------------

  - id: openings-min-window-count
    severity: warn
    description: >
      planta_74 has at least 2 windows (SUITE 01 north, BANHO 01
      east). A 0-window consensus likely means the extractor
      misclassified them as glazed_balcony or wall_gap; surface for
      review.
    rule:
      type: openings_min_kind_count
      kind: window
      min_count: 2

  - id: openings-min-glazed-balcony-count
    severity: warn
    description: >
      planta_74 has 2 porta-vidro openings (SALA / TERRACO SOCIAL,
      SUITE 02 / TERRACO SOCIAL). Drop to 0 → glazed_balcony class
      missing; investigate before shipping.
    rule:
      type: openings_min_kind_count
      kind: glazed_balcony
      min_count: 2

  # ---- info: total opening counts ---------------------------------

  - id: openings-total-count
    severity: info
    description: >
      Observation: total openings count. Canonical is 11; the
      annotated fixture is 12 (extra LAVABO variant). Drift to <8
      or >20 is the bad signal.
    rule:
      type: openings_count_range
      min: 5
      max: 30
