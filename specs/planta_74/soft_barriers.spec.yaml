# SDD spec — soft_barriers aspect on planta_74.
#
# Source of truth: human-annotated PDF + tools/audit_soft_barriers.py
# audit results from Frente 2 PR #143. Architectural reading of
# planta_74.pdf: the only legitimate peitoris/muretas are sb004
# ("PEITORIL H=1,10M" along terraço south edge) and h_sb000
# ("MURETA" between TER. SOC and TER. TEC). The other seven SBs
# carried by the V7 vector extractor are wall-coincident noise
# (FP-006 hard rejects).
#
# Companion: docs/engineering/spec_driven_development.md
schema_version: "1.0.0"
target: planta_74

contracts:

  # ---- critical: peitoris must survive ----------------------------

  - id: soft_barriers-protected-count-minimum
    severity: critical
    description: >
      At least TWO semantically-marked soft_barriers must survive in
      the consensus: the south-edge peitoril and the inter-terraço
      mureta. A consensus shipping with zero soft_barriers is the
      signal that someone hit "delete all" on Frente 2's reject
      decisions instead of converting them to overrides.
    evidence_pointers:
      - runs/planta_74_plan_shell/soft_barriers_all.png
      - docs/learning/failure_patterns.md#FP-006
    rule:
      type: soft_barriers_protected_count
      min: 2
      semantic_keywords:
        - peitoril
        - mureta
        - guarda
        - parapet

  # ---- warn: noise / wall-coincident SBs --------------------------

  - id: soft_barriers-no-full-height-rendering
    severity: warn
    description: >
      Soft barriers must be rendered as PARAPETS (1.10 m), never as
      full-height walls (2.70 m). When the plan-shell exporter or
      consume_consensus.rb emits a soft_barrier slab at WALL_HEIGHT_M,
      the visual fidelity is wrong (the terraço reads as an indoor
      room). Spec rule reads the geometry-invariants report's
      soft_barrier groups; warn if any reports height ≥ 2.0 m.
    rule:
      type: soft_barrier_height_band
      max_height_m: 2.0

  - id: soft_barriers-not-wall-coincident-noise
    severity: warn
    description: >
      Per FP-006 the 3-point sample filter rejects SB segments whose
      midpoints sit inside a wall axis. A consensus with > 4 SBs
      whose overlap_fraction_with_walls is > 0.5 (Frente 2 audit
      threshold) is shipping wall-coincident noise as parapets —
      the audit_soft_barriers tool flagged 7 such cases on planta_74.
      This contract surfaces if the noise re-enters the consensus.
    rule:
      type: soft_barriers_wall_coincident_count
      max_overlap_fraction: 0.5
      max_count: 4

  # ---- info: total SB count ---------------------------------------

  - id: soft_barriers-count-baseline
    severity: info
    description: >
      Observation: total soft_barriers count. Canonical baseline is
      8–9; <4 or >20 is the bad signal (drop = filter accidentally
      cleaning legitimate peitoris; surge = V7 extractor regressed).
    rule:
      type: soft_barriers_count_range
      min: 2
      max: 30
