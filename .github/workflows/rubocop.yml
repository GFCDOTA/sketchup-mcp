name: RuboCop (Ruby lint)

# Cycle 9 spike (2026-05-07): conservative bootstrap of Ruby
# linting for tools/*.rb. Only default Lint cops enabled in
# .rubocop.yml; rubocop-sketchup is deferred to a follow-up.
#
# Trigger only when a Ruby file or the lint config itself
# changes — this keeps CI minutes negligible for the (frequent)
# pure-Python PRs.

on:
  pull_request:
    paths:
      - 'tools/**/*.rb'
      - '.rubocop.yml'
      - 'Gemfile.lint'
      - '.github/workflows/rubocop.yml'
  push:
    branches: [main, develop]
    paths:
      - 'tools/**/*.rb'
      - '.rubocop.yml'
      - 'Gemfile.lint'
      - '.github/workflows/rubocop.yml'
  workflow_dispatch:

jobs:
  rubocop:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          # Use the lint-only Gemfile so this job does not require
          # a real Ruby application gemfile at the repo root.
          working-directory: '.'
          rubygems: latest

      - name: Install lint dependencies
        env:
          BUNDLE_GEMFILE: Gemfile.lint
        run: bundle install

      - name: Run RuboCop on tools/
        env:
          BUNDLE_GEMFILE: Gemfile.lint
        run: |
          bundle exec rubocop --no-color --parallel --format github tools/
