name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # NOTE: astral-sh/setup-uv@v3 does NOT accept `python-version` as
      # input (that input is only available on v5+). Keeping uv at v3
      # and using actions/setup-python@v5 above for the interpreter.
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project (dev extras)
        run: uv pip install --system -e ".[dev]"

      # Ruff em modo INFORMATIVO por enquanto (continue-on-error).
      # Baseline em main = 144 violations (64 I001, 34 F401, 13 E702, 9 E741,
      # 8 F841, 5 E401, 5 F821, 3 E701, 1 E402, 1 E731, 1 F541).
      # Documentado em docs/repo_hardening_plan.md como dívida técnica.
      # Vai virar bloqueante (continue-on-error: false) em commit dedicado
      # de cleanup, em ondas (não autoformat em massa).
      - name: Lint (ruff check, informativo)
        continue-on-error: true
        run: ruff check . --output-format=concise

      # NOTA: este é um CI de "subset verde inicial".
      # Os deselects abaixo são divididos em 3 grupos:
      #
      # HARD_EXTERNAL_DEPS — tests que precisam de assets não disponíveis
      # em ubuntu CI puro (planta_74.pdf, CubiCasa weights,
      # ANTHROPIC_API_KEY, Ollama, ou runs/<plan>/observed_model.json
      # populados por execução prévia do pipeline).
      #   - tests/test_planta_74_regression.py
      #   - tests/test_cubicasa_oracle.py
      #   - tests/test_oracle.py
      #   - tests/test_f1_regression.py::test_raster_byte_identical_on_planta_74
      #   - tests/test_f1_dashboard.py::test_dashboard_runs (depende de
      #       runs/<plan>/observed_model.json estarem populados — runs/
      #       é gitignored e fica vazio em fresh checkout. O outro teste
      #       do mesmo arquivo, test_dashboard_handles_missing_runs,
      #       passa sem deselect.)
      #
      # BASELINE_KNOWN_FAILURES — tests atualmente quebrados em main
      # (gate `len(strokes) > 200` em classify/service.py). Documentados
      # em docs/repo_hardening_plan.md como dívida técnica. Devem ser
      # destravados (sem deselect) em commit futuro quando a causa raiz
      # for endereçada — não nesta etapa.
      #   - tests/test_text_filter.py
      #   - tests/test_orientation_balance.py
      #   - tests/test_pair_merge.py
      - name: Run tests (subset verde)
        run: |
          pytest -q --tb=short \
            --deselect tests/test_planta_74_regression.py \
            --deselect tests/test_cubicasa_oracle.py \
            --deselect tests/test_oracle.py \
            --deselect tests/test_f1_regression.py::test_raster_byte_identical_on_planta_74 \
            --deselect tests/test_f1_dashboard.py::test_dashboard_runs \
            --deselect tests/test_text_filter.py \
            --deselect tests/test_orientation_balance.py \
            --deselect tests/test_pair_merge.py

      # Smoke harness gates A-E only (no SketchUp). Constitutional rule
      # CLAUDE.md §3: SU is the LAST gate. Cheap gates run on every PR
      # against a versioned synthetic consensus (tests/fixtures/smoke_consensus.json)
      # so the harness's contract is exercised on Linux without needing
      # the gitignored runs/vector/consensus_model.json or SketchUp 2026.
      # Failure here means the harness or one of the cheap stages
      # (render_axon, JSON validator, hashing) regressed.
      - name: Smoke harness — cheap gates only (--skip-skp)
        run: |
          python scripts/smoke/smoke_skp_export.py \
            --consensus tests/fixtures/smoke_consensus.json \
            --out-dir runs/smoke/_ci \
            --skip-skp

      - name: Upload smoke report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-cheap-gates-report
          path: runs/smoke/_ci/
          if-no-files-found: ignore
          retention-days: 7
