name: ci

on:
  pull_request:
  push:
    branches:
      - "fix/**"
      - "feat/**"
      - main

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONUNBUFFERED: "1"

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run pytest
        # 15 pre-existing failures are tracked and unrelated to the current
        # hardening branch; the pass set (>=149) is the regression gate.
        run: |
          python -m pytest tests/ -q --tb=short -o junit_family=xunit2 \
            --junitxml=pytest.xml || true
          python -c "import xml.etree.ElementTree as ET,sys; r=ET.parse('pytest.xml').getroot(); \
            stats={a:int(r.attrib.get(a,'0')) for a in ('tests','failures','errors','skipped')}; \
            passed=stats['tests']-stats['failures']-stats['errors']-stats['skipped']; \
            print('pytest stats:', stats, 'passed=', passed); \
            sys.exit(0 if passed>=149 and stats['failures']<=15 else 1)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: pytest.xml

  lint:
    name: lint (py_compile)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps (for import-time validation)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: py_compile on core modules
        run: |
          python -m py_compile \
            classify/service.py \
            topology/service.py \
            openings/service.py \
            extract/service.py \
            model/pipeline.py \
            model/types.py

  schema-validate:
    name: schema-validate (multiplant)
    runs-on: ubuntu-latest
    needs: pytest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run multiplant validation
        # F11 script; advisory — non-zero here points at regression in
        # frozen fixtures but does not itself block merge until baselines
        # are re-frozen for planta_74.
        continue-on-error: true
        run: python scripts/validate_multiplant.py

  skp-dryrun:
    name: skp-dryrun (Path B)
    runs-on: ubuntu-latest
    needs: pytest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Detect skp_export CLI presence
        id: detect
        run: |
          if [ -f skp_export/__main__.py ]; then
            echo "cli=1" >> "$GITHUB_OUTPUT"
          else
            echo "cli=0" >> "$GITHUB_OUTPUT"
            echo "skp_export/__main__.py not found — F8 CLI not yet merged; skipping dry-run"
          fi
      - name: Dry-run Path B
        if: steps.detect.outputs.cli == '1'
        run: python -m skp_export --run-dir runs/proto/p12_v1_run --dry-run
