name: Repo Health (Hygiene + Project State)

# Enforces docs/REPO_HYGIENE.md + CLAUDE.md §15 mechanically.
#
# Two stdlib-only gates run here:
#   1. scripts/project_state_check.py — every canonical doc / fixture /
#      script that PROJECT_STATE.md depends on must exist and be non-
#      empty. Hard FAIL exits non-zero. Cheap (<2 s).
#   2. tools/repo_health_gate.py --mode check --base origin/develop —
#      compares the PR diff vs develop. Fails on ERROR-class findings:
#      tmp files tracked, generated artifacts outside allowed paths,
#      new top-level dir not in canonical set, new .md without Status:
#      header, structural diff without PROJECT_STATE.md update.
#      Pre-existing warnings do not fail (grandfathered).
#
# Both gates are read-only. They never touch source.
#
# Bypass: there is no bypass. ERROR-class findings indicate the policy
# in docs/REPO_HYGIENE.md is being violated; fix the underlying issue
# or update the policy + the gate's allowlist in the same PR.

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  project-state:
    name: G-PROJECT-STATE (canonical-paths hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # repo_health_gate --base needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run project_state_check
        run: |
          python scripts/project_state_check.py
          python scripts/project_state_check.py --json > project_state.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-state-report
          path: project_state.json
          retention-days: 30

  repo-health:
    name: G-REPO-HEALTH (hygiene gate, PR-diff aware)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run repo_health_gate (check, PR-diff aware)
        run: |
          if [ -n "${{ steps.base.outputs.ref }}" ]; then
            python tools/repo_health_gate.py \
                   --mode check \
                   --base "${{ steps.base.outputs.ref }}" \
                   --no-report \
                   --json > repo_health.json
            python tools/repo_health_gate.py \
                   --mode check \
                   --base "${{ steps.base.outputs.ref }}"
          else
            python tools/repo_health_gate.py --mode check --no-report --json > repo_health.json
            python tools/repo_health_gate.py --mode check
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-report
          path: |
            repo_health.json
            reports/current/repo_health_report.md
          retention-days: 30
