name: Quality Gates (Plan Truth + Micro Truth + Coherence)

# Cycle 10 (2026-05-07): builds the planta_74 vector pipeline end-to-end
# in CI, then runs the three Stage-1.5 quality gates in --strict mode.
# Strict mode means each gate exits non-zero when its contract is
# violated, so this workflow is a hard merge blocker — *not* the
# informational subset that ci.yml currently runs.
#
# What this workflow guarantees on every PR:
#   1. tests/test_planta_74_truth_gate.py — already runs in ci.yml
#      via the subset pytest, but here we re-run it in isolation so
#      a failure shows up as a dedicated, named CI status.
#   2. tools.coherence_audit --strict — would fail on any
#      assumptions.strict_blockers condition (drops, asks, floating
#      doors). Today's baseline is clean.
#   3. tools.micro_truth_gate --strict — fails if any room in
#      ground_truth/planta_74_micro.json is missing or fails its
#      checks. Today's baseline scores 1.0 across 4 rooms (after
#      Cycle 7) or 1.0 on 1 room (before Cycle 7 merges).
#
# Why a separate workflow instead of a job inside ci.yml: ci.yml is
# already large; a quality-gate failure should be visually distinct
# from a unit-test failure, and this lets the workflow be re-run
# independently from `Re-run failed checks`.

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project (dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Build canonical consensus (5-stage vector pipeline)
        run: |
          mkdir -p runs/_ci_quality_gates
          python -m tools.build_vector_consensus planta_74.pdf \
            --out runs/_ci_quality_gates/c0_consensus.json \
            --detect-openings
          python -m tools.extract_room_labels planta_74.pdf \
            --out runs/_ci_quality_gates/labels.json
          python -m tools.rooms_from_seeds \
            runs/_ci_quality_gates/c0_consensus.json \
            runs/_ci_quality_gates/labels.json \
            --out runs/_ci_quality_gates/c1_with_rooms.json \
            --canonicalize-rooms --room-canonicalization-tol 8
          python -m tools.extract_openings_vector planta_74.pdf \
            --consensus runs/_ci_quality_gates/c1_with_rooms.json \
            --out runs/_ci_quality_gates/c2_with_openings.json \
            --mode replace --classify-kind --detect-wall-gaps
          python -m tools.classify_openings_by_room_context \
            runs/_ci_quality_gates/c2_with_openings.json \
            --out runs/_ci_quality_gates/c3_classified.json

      - name: Plan Truth Gate (versioned baseline)
        run: |
          pytest tests/test_planta_74_truth_gate.py -v --tb=short

      - name: Coherence Audit (strict)
        run: |
          python -m tools.coherence_audit \
            runs/_ci_quality_gates/c3_classified.json \
            --out-dir runs/_ci_quality_gates \
            --strict

      - name: Micro Truth Gate (strict, against canonical consensus)
        run: |
          python -m tools.micro_truth_gate \
            runs/_ci_quality_gates/c3_classified.json \
            --ground-truth ground_truth/planta_74_micro.json \
            --out runs/_ci_quality_gates/micro_truth_report.json \
            --strict

      # Fidelity Engine v1 (Ground Truth v1) — ADVISORY / report-only.
      #
      # The hashFiles() guard SKIPS this step entirely when
      # tools/fidelity or the expected_model.json is missing
      # (early-merge ordering protection).
      #
      # When the files exist, the step runs in --strict mode AND
      # is marked continue-on-error so the workflow stays GREEN on
      # develop. Rationale:
      # - Fidelity v1 INTENTIONALLY hard-fails today on FP-012
      #   (SUITE 01 / SUITE 02 areas) + the adjacency_f1 gap.
      #   Those failures are the expected design output — the gate
      #   measures architectural truth; the pipeline doesn't yet
      #   match it.
      # - Hard-blocking merges on this would turn develop red on
      #   every push until Cycle 8b (concave-hull promote) lands.
      # - Solution: --strict still computes the exact would-block
      #   list and writes it into fidelity_report.json; the
      #   continue-on-error mask only affects the step's exit code,
      #   not the report content.
      # - fidelity_report.json + fidelity_scorecard.md are uploaded
      #   as artifacts (next step) for human inspection.
      #
      # PROMOTE TO HARD BLOCKER (drop continue-on-error) AFTER
      # Cycle 8b lands and the 3 known hard_fails clear. Tracked in
      # docs/ground_truth_v1.md "Next steps" + .ai_bridge/TODO_NEXT.
      - name: Fidelity Engine v1 (advisory until Cycle 8b clears FP-012)
        if: hashFiles('tools/fidelity/__init__.py', 'ground_truth/planta_74/expected_model.json') != ''
        continue-on-error: true
        run: |
          python -m tools.fidelity.compare_generated_to_expected \
            runs/_ci_quality_gates/c3_classified.json \
            --expected ground_truth/planta_74/expected_model.json \
            --out runs/_ci_quality_gates/fidelity_report.json \
            --scorecard runs/_ci_quality_gates/fidelity_scorecard.md \
            --strict

      - name: Upload quality-gate artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-reports
          path: runs/_ci_quality_gates/
          if-no-files-found: warn
          retention-days: 14
