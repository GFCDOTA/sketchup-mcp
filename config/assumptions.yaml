# config/assumptions.yaml — explicit project-level decision policy.
#
# This file is what the coherence_audit pipeline reads to convert
# detected ambiguity into concrete decisions WITHOUT having to ask
# the user every run. It's "Rodada 1" of the questionnaire — versioned
# in-repo, answered once per project.
#
# Stage 1 scope (PR feature/coherence-audit):
#   - assumptions are READ but not used to mutate geometry / SKP
#   - classifier writes confidence + decision + hypotheses to each
#     opening based on these thresholds
#   - coherence_audit.py emits a non-blocking report by default
#
# Schema version 1.0. Future versions MUST stay backward-compatible
# OR bump major + add a compatibility layer in
# tools/assumptions_loader.py.

schema_version: "1.0"

# What is this model for? Affects what is "good enough".
goal: furniture_layout    # one of: furniture_layout | visual_review | as_built

# How aggressive should the pipeline be when evidence is thin?
risk_policy: conservative   # one of:
                            #   conservative — drop / ask before inventing
                            #   balanced     — best hypothesis with warning
                            #   aggressive   — always pick best hypothesis

# Confidence -> decision mapping. confidence is a float in [0.0, 1.0]
# that the classifier writes for each opening. The first matching
# threshold from top to bottom decides the routing:
#
#   conf >= clean_above        -> opening goes to clean export
#   conf in [debug_above, ...) -> goes to debug export only
#   conf in [ask_above, ...)   -> question added to questions.json
#   conf < drop_below          -> dropped entirely (logged in report)
#
# The default policy below biases toward `debug` over `clean`: a
# decision needs strong evidence (≥ 0.75) to enter the clean SKP.
# Adjust per project in a copy of this file.
ambiguity:
  drop_below: 0.20
  ask_above: 0.20      # 0.20 <= conf < 0.50 → ask
  debug_above: 0.50    # 0.50 <= conf < 0.75 → debug only
  clean_above: 0.75    # conf >= 0.75 → clean

# Per-element opinions. These do NOT mutate geometry in Stage 1 —
# they're recorded in coherence_report.json as policy applied to each
# decision so a future Stage 2 can act on them.
walls:
  short_fragment_threshold_m: 0.12
  short_fragment_action: mark_suspect    # mark_suspect | keep | remove
  duplicate_or_overlap_action: mark_suspect

openings:
  require_host_wall: true
  floating_doors_action: mark_suspect    # not yet enforced
  unknown_kind_default: passage          # when classifier can't decide
  prefer_door_when_private_pair: true

transparent_elements:
  unknown_transparent_action: debug_only

rooms:
  simplify_weird_polygons: false
  unlabeled_room_action: keep_without_name
  invalid_polygon_action: mark_suspect

# Strict mode: behaviors when --strict is passed to coherence_audit.
# Default run (no --strict) ALWAYS exits 0 even if these conditions
# are present — only the report records them.
strict_blockers:
  - opening_decision_ask
  - opening_decision_drop
  - floating_door
  - opening_without_host_wall
  - invalid_room_polygon
  - duplicate_or_overlap_walls
