# Vector store local pro RAG do arquiteto (FP-037).
# Sobe um Qdrant containerizado, persistência em volume local.
# Uso:  docker compose -f docker-compose.rag.yml up -d
# O retrieve() usa isto SÓ como backend opcional de recall semântico —
# se o container estiver off, degrada pro faceted determinístico (honesto).
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sketchup-rag-qdrant
    ports:
      - "6333:6333"   # REST / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  qdrant_storage:
    name: sketchup_rag_qdrant_storage
